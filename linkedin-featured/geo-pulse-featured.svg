<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 627" width="1200" height="627" role="img" aria-label="GeoPulse, geopolitics in brief with context intact">
  <defs>
    <radialGradient id="gp-glow1" cx="72%" cy="40%" r="45%">
      <stop offset="0%" stop-color="#e63946" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#e63946" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gp-glow2" cx="20%" cy="82%" r="40%">
      <stop offset="0%" stop-color="#ff7380" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ff7380" stop-opacity="0"/>
    </radialGradient>
    <pattern id="gp-dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#e63946" fill-opacity="0.08"/>
    </pattern>
    <radialGradient id="gp-mask" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#fff" stop-opacity="1"/>
      <stop offset="70%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
    <mask id="gp-maskDots">
      <rect width="1200" height="627" fill="url(#gp-mask)"/>
    </mask>
    <linearGradient id="gp-accentBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e63946"/>
      <stop offset="100%" stop-color="#ff7380"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="627" fill="#05070d"/>
  <rect width="1200" height="627" fill="url(#gp-dots)" mask="url(#gp-maskDots)"/>
  <rect width="1200" height="627" fill="url(#gp-glow1)"/>
  <rect width="1200" height="627" fill="url(#gp-glow2)"/>

  <text x="80" y="116" fill="#ff7380" font-family="'JetBrains Mono', monospace" font-size="13" letter-spacing="2.5">
    GEOPULSE  /  EDITED FOR SIGNAL
  </text>

  <g font-family="'Fraunces', Georgia, serif" font-weight="300" letter-spacing="-1.5">
    <text x="80" y="250" fill="#e8e4dd" font-size="88">Geopolitics</text>
    <text x="80" y="344" fill="#e8e4dd" font-size="88">in brief.</text>
    <text x="80" y="438" fill="#ff7380" font-size="88" font-style="italic">Context intact.</text>
  </g>

  <g font-family="'DM Sans', sans-serif" font-weight="300" fill="#b0a898">
    <text x="80" y="504" font-size="19">Borders, trade routes, power shifts,</text>
    <text x="80" y="532" font-size="19">and the context behind the headlines.</text>
  </g>

  <g transform="translate(80,560)">
    <rect width="160" height="1.5" fill="url(#gp-accentBar)"/>
  </g>
  <text x="80" y="600" fill="#ff7380" font-family="'JetBrains Mono', monospace" font-size="12" letter-spacing="2">
    PULSE.LAVKESH.COM
  </text>

  <g transform="translate(770,260)">
    <path d="M 0 0 L 60 0 L 80 -40 L 110 60 L 140 -30 L 170 10 L 230 10 L 250 -50 L 280 40 L 310 10 L 400 10"
          fill="none" stroke="#e63946" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/>
    <circle cx="110" cy="60" r="5" fill="#e63946"/>
    <circle cx="250" cy="-50" r="5" fill="#ff7380"/>
    <circle cx="400" cy="10" r="6" fill="#e63946"/>
  </g>

  <g transform="translate(930,160)" opacity="0.55">
    <circle cx="0" cy="0" r="110" fill="none" stroke="#e63946" stroke-width="1" stroke-opacity="0.4"/>
    <circle cx="0" cy="0" r="75" fill="none" stroke="#ff7380" stroke-width="1" stroke-opacity="0.5"/>
    <circle cx="0" cy="0" r="42" fill="none" stroke="#e63946" stroke-width="1" stroke-opacity="0.7"/>
    <circle cx="0" cy="0" r="6" fill="#e63946"/>
  </g>
</svg>
