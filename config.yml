# GeoPulse Configuration
# All values can be overridden via environment variables.

# Cron schedule for the GitHub Actions workflow (default: every hour)
update_schedule: "0 * * * *"

# News sources to use. Options: "newsapi", "gdelt", "rss"
# gdelt and rss require no API key.
news_sources:
  - gdelt
  - rss

# Additional NewsAPI source (requires NEWSAPI_KEY secret)
# Uncomment the line below to enable:
# - newsapi

# Keywords used to filter/query geopolitics news
news_query: "geopolitics OR diplomacy OR sanctions OR conflict OR NATO OR United Nations OR international relations"

# LLM provider for summarization.
# Options: "none" (no key required), "openai", "anthropic", "huggingface"
# Set the corresponding secret (OPENAI_API_KEY, ANTHROPIC_API_KEY, HF_API_KEY)
# in your repository's Settings → Secrets and variables → Actions.
llm_provider: "none"

# LLM model to use (only relevant when llm_provider != "none")
llm_model: "gpt-4o-mini"

# Maximum number of articles to process per run
max_articles: 20

# Number of days of newsletter archives to retain in the repo
archive_days: 30

# RSS feeds to poll (used when "rss" is in news_sources)
rss_feeds:
  - url: "https://feeds.bbci.co.uk/news/world/rss.xml"
    source: "BBC World"
  - url: "https://www.aljazeera.com/xml/rss/all.xml"
    source: "Al Jazeera"
  - url: "https://rss.nytimes.com/services/xml/rss/nyt/World.xml"
    source: "NYT World"
  - url: "https://feeds.reuters.com/reuters/worldNews"
    source: "Reuters World"
  - url: "https://www.theguardian.com/world/rss"
    source: "The Guardian World"

# Optional audience hooks to broaden discovery via additional sources.
# These are kept low-volume by default and still fully attributed.
audience_hooks_enabled: true
audience_hooks_max_per_feed: 3

audience_hook_feeds:
  - url: "https://rss.cnn.com/rss/edition_world.rss"
    source: "CNN World"
  - url: "https://www.france24.com/en/rss"
    source: "France 24"
  - url: "https://www.dw.com/en/top-stories/s-9097?maca=en-rss-en-top-1022-rdf"
    source: "DW Top Stories"

# Inshorts-compatible hooks.
# GeoPulse uses Google News RSS search against inshorts.com for specific topics.
inshorts_hook_queries:
  - "geopolitics"
  - "world"
  - "international relations"
